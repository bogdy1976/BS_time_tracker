<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3F Hours Tracker - Base Layer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            color: #d32f2f;
            margin-top: 0;
            font-size: 22px;
            border-bottom: 2px solid #f4f6f9;
            padding-bottom: 10px;
        }
        .instruction {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            background: #eef2f7;
            padding: 10px;
            border-radius: 6px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        /* Time Picker Row Styling */
        .time-picker-container {
            display: flex;
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .time-select-wrapper {
            flex: 1;
        }
        .time-select-wrapper label {
            font-size: 12px;
            color: #555;
            font-weight: normal;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-add {
            background-color: #2e7d32;
            color: white;
        }
        .btn-download {
            background-color: #0277bd;
            color: white;
        }
        .btn-clear {
            background-color: #757575;
            color: white;
            font-size: 14px;
            padding: 10px;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }
        .log-table th, .log-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .log-table th {
            background-color: #f4f6f9;
        }
        .total-box {
            margin-top: 15px;
            font-weight: bold;
            text-align: right;
            font-size: 16px;
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Base Layer - 3F Hours Log</h2>
    <div class="instruction">
        Select the exact hours and minutes worked. Click "Download CSV Spreadsheet" to export your data for 3F. Your entries are saved automatically on this browser.
    </div>

    <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label for="activity">Activity Type</label>
        <select id="activity">
            <option value="Website Development">Website Development</option>
            <option value="Administration & Bookkeeping">Administration & Bookkeeping</option>
            <option value="Marketing & Social Media">Marketing & Social Media</option>
            <option value="Client Work / Production">Client Work / Production</option>
            <option value="Other Business Task">Other Business Task</option>
        </select>
    </div>

    <div class="form-group">
        <label>Time Spent (Exact duration)</label>
        <div class="time-picker-container">
            <div class="time-select-wrapper">
                <label for="hoursInput">Hours</label>
                <select id="hoursInput"></select>
            </div>
            <div class="time-select-wrapper">
                <label for="minutesInput">Minutes</label>
                <select id="minutesInput"></select>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="notes">Specific Notes (Optional)</label>
        <textarea id="notes" rows="2" placeholder="What did you build or work on?"></textarea>
    </div>

    <button class="btn-add" onclick="addEntry()">Add Entry to Log</button>
    <button class="btn-download" onclick="downloadCSV()">Download CSV Spreadsheet</button>
    <button class="btn-clear" onclick="clearLog()">Clear Log History</button>

    <div class="total-box">Total Saved: <span id="totalHours">0.0</span> hrs</div>

    <table class="log-table" id="logTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Activity</th>
                <th>Hours</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody>
            <!-- Log entries loaded dynamically -->
        </tbody>
    </table>
</div>

<script>
    // Set today's default date
    document.getElementById('date').valueAsDate = new Date();

    // Dynamically build Time options for perfect mobile picking
    const hoursDropdown = document.getElementById('hoursInput');
    for (let i = 0; i <= 16; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + ' hrs';
        if (i === 1) opt.selected = true; // Default to 1 hour
        hoursDropdown.appendChild(opt);
    }

    const minsDropdown = document.getElementById('minutesInput');
    for (let i = 0; i < 60; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + ' min';
        minsDropdown.appendChild(opt);
    }

    // Load saved data from localStorage
    let logs = JSON.parse(localStorage.getItem('baseLayerLogs')) || [];
    let totalHours = 0;

    renderLogs();

    function addEntry() {
        const date = document.getElementById('date').value;
        const activity = document.getElementById('activity').value;
        const h = parseInt(document.getElementById('hoursInput').value) || 0;
        const m = parseInt(document.getElementById('minutesInput').value) || 0;
        const notes = document.getElementById('notes').value.trim().replace(/,/g, ';') || "N/A";

        // Convert pure hours + minutes into a clean decimal for 3F math
        // Example: 1 hour 30 min = 1.50 hours. 1 hour 1 minute = 1.02 hours.
        const decimalHours = h + (m / 60);

        if (decimalHours === 0) {
            alert("Please log some time before saving.");
            return;
        }

        // Add to array
        logs.push({ date, activity, hours: decimalHours, notes });
        
        // Save to browser vault
        localStorage.setItem('baseLayerLogs', JSON.stringify(logs));
        
        renderLogs();

        // Reset inputs
        document.getElementById('notes').value = '';
        document.getElementById('hoursInput').value = 1;
        document.getElementById('minutesInput').value = 0;
    }

    function renderLogs() {
        totalHours = 0;
        const tableBody = document.getElementById('logTable').getElementsByTagName('tbody')[0];
        tableBody.innerHTML = ""; 

        logs.forEach(log => {
            totalHours += log.hours;
            const newRow = tableBody.insertRow();
            // Displays cleanly up to 2 decimal places so minutes show precisely
            newRow.innerHTML = `<td>${log.date}</td><td>${log.activity}</td><td>${log.hours.toFixed(2)}</td><td>${log.notes}</td>`;
        });

        document.getElementById('totalHours').innerText = totalHours.toFixed(2);
    }

    function downloadCSV() {
        if (logs.length === 0) {
            alert("Your log is empty. Save some entries before downloading!");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,Date,Activity,Hours Spent,Notes\n";
        
        logs.forEach(log => {
            csvContent += `${log.date},${log.activity},${log.hours.toFixed(2)},${log.notes}\n`;
        });

        csvContent += `,,${totalHours.toFixed(2)},Total Registered Hours\n`;

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `3F_Hours_Log_${new Date().toISOString().slice(0,7)}.csv`);
        document.body.appendChild(link);
        
        link.click();
        document.body.removeChild(link);
    }

    function clearLog() {
        if (confirm("Are you absolutely sure you want to clear your saved data? Make sure you downloaded your CSV first!")) {
            localStorage.removeItem('baseLayerLogs');
            logs = [];
            renderLogs();
        }
    }
</script>

</body>
</html>
